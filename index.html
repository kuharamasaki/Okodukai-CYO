<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Okodukai CYO</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Okodukai CYO</p>
          <h1>お小遣い台帳</h1>
        </div>
        <div class="topbar-controls">
          <label class="field compact">
            <span>こども</span>
            <select id="childSelect"></select>
          </label>
          <label class="field compact">
            <span>月</span>
            <input id="monthSelect" type="month">
          </label>
        </div>
      </header>

      <main class="dashboard">
        <section class="ledger-grid">
          <div class="panel ledger-panel">
            <div class="panel-heading">
              <h2>収支一覧</h2>
              <button id="exportBtn" class="secondary" type="button">JSON保存</button>
            </div>
            <form id="ledgerEntryForm" class="ledger-entry-row">
              <input data-field="date" type="date" required aria-label="日付">
              <select data-field="type" aria-label="収入または支出">
                <option value="income">収入</option>
                <option value="expense">支出</option>
              </select>
              <select data-field="template" aria-label="登録済みの内容"></select>
              <input data-field="title" type="text" placeholder="内容" required aria-label="内容">
              <select data-field="category" aria-label="用途"></select>
              <label class="money-input">
                <input data-field="amount" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="金額" required aria-label="金額">
                <span>円</span>
              </label>
              <button class="secondary save-row-template" type="button">登録</button>
              <button class="primary" type="submit">追加</button>
            </form>
            <div id="templateList" class="template-list" aria-label="登録済みの内容"></div>
            <div class="table-wrap">
              <table class="ledger-table">
                <thead>
                  <tr>
                    <th>日付</th>
                    <th>種類</th>
                    <th>内容</th>
                    <th>用途</th>
                    <th>金額</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="entryRows"></tbody>
                <tfoot>
                  <tr>
                    <th colspan="2">収入</th>
                    <td colspan="4" id="incomeTotal">¥0</td>
                  </tr>
                  <tr>
                    <th colspan="2">支出</th>
                    <td colspan="4" id="expenseTotal">¥0</td>
                  </tr>
                  <tr class="balance-row">
                    <th colspan="2">残高</th>
                    <td colspan="4" id="balanceTotal">¥0</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </section>

        <section class="work-grid">
          <div class="panel closing-panel">
            <div class="panel-heading">
              <h2>月末チェック</h2>
            </div>
            <div class="closing-box">
              <label class="field">
                <span>財布の残高</span>
                <input id="walletBalance" type="number" min="0" step="1" placeholder="0">
              </label>
              <button id="confirmClosingBtn" class="primary" type="button">一致を確認</button>
              <p id="closingMessage" class="message"></p>
            </div>
          </div>

          <div class="panel theme-panel">
            <div class="panel-heading">
              <h2>背景</h2>
            </div>
            <div id="themeChoices" class="theme-choices"></div>
          </div>

          <div class="panel wishlist-panel">
            <div class="panel-heading">
              <h2>ほしいもの</h2>
              <strong id="wishNeedTotal">あと ¥0</strong>
            </div>
            <form id="wishForm" class="wish-form">
              <input id="wishName" type="text" placeholder="ほしいもの" required>
              <input id="wishPrice" type="number" min="1" step="1" placeholder="ねだん" required>
              <button class="secondary" type="submit">追加</button>
            </form>
            <div id="wishList" class="wish-list"></div>
          </div>
        </section>

        <section class="analysis-band">
          <div class="panel chart-panel">
            <div class="panel-heading">
              <h2>分析</h2>
              <div class="segmented" role="group" aria-label="分析期間">
                <button class="period-btn active" type="button" data-period="month">月</button>
                <button class="period-btn" type="button" data-period="half">半年</button>
                <button class="period-btn" type="button" data-period="year">一年</button>
              </div>
            </div>
            <canvas id="categoryChart" width="760" height="300" aria-label="用途別支出グラフ"></canvas>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
